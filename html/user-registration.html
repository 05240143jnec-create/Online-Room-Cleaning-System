<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <link rel="stylesheet" href="../style/user-registration.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="register-container">
        <div class="logo-container">
            <!-- Replace with your logo image -->
            <img src="../image/WhatsApp Image 2025-09-15 at 22.32.34_f154cbae.jpg" alt="Logo" class="logo">
        </div>
        <h2 class="register-title">Registration</h2>
        <form>
            <div class="input-group">
                <input type="text" placeholder="Username" required>
            </div>
            <div class="input-group">
                <input type="text" placeholder="Contact" required>
            </div>
            <div class="input-group">
                <input type="email" placeholder="Email" required>
            </div>
            <div class="input-group">
                <input type="password" placeholder="Password" required>
            </div>
            <div class="input-group">
                <input type="password" placeholder="Confirm Password" required>
            </div>
            <button type="submit" class="sign-up-button">Sign Up</button>
        </form>
        <a href="../html/login.html" class="back-to-login">Already have an account? Log in</a>
    </div>
</body>
</html>
