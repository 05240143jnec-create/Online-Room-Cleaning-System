<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Selection</title>
    <link rel="stylesheet" href="../style/block-location.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar">
            <span id="current-time"></span>
            <div class="status-icons">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><path d="M5 12.55a11 11 0 0 1 14.08 0"></path><path d="M1.42 9a16 16 0 0 1 21.16 0"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12" y2="20"></line></svg>
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><rect x="1" y="6" width="18" height="12" rx="3" ry="3"></rect><line x1="23" y1="12" x2="23" y2="12"></line></svg>
            </div>
        </div>

        <div class="content-area">
            <img src="../image/WhatsApp Image 2025-09-15 at 22.32.34_f154cbae.jpg" alt="Logo" class="main-logo">
            
            <form class="selection-form">
                <select name="khangzang" class="dropdown">
                    <option value="" disabled selected>Select Khangzang</option>
                    <option value="duekhor">Duekhor</option>
                    <option value="jamphel">Jamphel</option>
                    <option value="namsay">Namsay</option>
                    <option value="zilnyon">Zilnyon</option>
                </select>

                <select name="block" class="dropdown">
                    <option value="" disabled selected>Select Block</option>
                    <option value="A">Block A</option>
                    <option value="B">Block B</option>
                    <option value="C">Block C</option>
                    <option value="D">Block D</option>
                    <option value="E">Block E</option>
                    <option value="F">Block F</option>
                </select>

                <input type="text" name="room_no" class="input-field" placeholder="Enter Room Number">
            </form>
        </div>

        <div class="buttons-container">
            <button class="back-button">Back</button>
            <button class="proceed-button">Proceed</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
