<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Details</title>
    <link rel="stylesheet" href="../style/detail-of-block.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar">
            <span id="current-time"></span>
            <div class="status-icons">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><path d="M5 12.55a11 11 0 0 1 14.08 0"></path><path d="M1.42 9a16 16 0 0 1 21.16 0"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12" y2="20"></line></svg>
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><rect x="1" y="6" width="18" height="12" rx="3" ry="3"></rect><line x1="23" y1="12" x2="23" y2="12"></line></svg>
            </div>
        </div>

        <div class="content-area">
            <img src="path/to/your/circular-logo.png" alt="Logo" class="main-logo">
            
            <button class="details-button">Details</button>
            
            <div class="details-container">
                <div class="detail-field">Namsay</div>
                <div class="detail-field">G</div>
                <div class="detail-field">2-8</div>
            </div>
        </div>

        <div class="buttons-container">
            <button class="back-button">Back</button>
            <button class="submit-button">Submit</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
