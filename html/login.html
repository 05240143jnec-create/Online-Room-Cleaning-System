<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Interface</title>
    <link rel="stylesheet" href="../style/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <img src="../image/WhatsApp Image 2025-09-15 at 22.32.34_f154cbae.jpg" alt="Company Logo" class="rotating-logo">
        </div>
        
        <h2 class="login-title">Login</h2>
        <form class="login-form">
            <div class="input-group">
                <input type="text" placeholder="Username" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <div class="show-password-container">
                <input type="checkbox" id="show-password">
                <label for="show-password">Show Password</label>
            </div>
            <button type="submit" class="sign-in-button">SIGN IN</button>
        </form>
        <div class="links-container">
            <a href="#" class="forgot-link">Forgot Username / Password?</a>
            <p class="signup-text">Don't have an account? <a href="../html/user-registration.html" class="signup-link">Sign up</a></p>
        </div>
    </div>

    <script>
        const passwordInput = document.getElementById('password');
        const showPasswordCheckbox = document.getElementById('show-password');

        showPasswordCheckbox.addEventListener('change', function() {
            if (showPasswordCheckbox.checked) {
                passwordInput.type = 'text';
            } else {
                passwordInput.type = 'password';
            }
        });
    </script>
</body>
</html>
