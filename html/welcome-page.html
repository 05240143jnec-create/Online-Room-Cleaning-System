<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Room Cleaning System</title>
    <link rel="stylesheet" href="../style/welcome.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar">
            <span id="time"></span>
            <div class="status-icons">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><path d="M5 12.55a11 11 0 0 1 14.08 0"></path><path d="M1.42 9a16 16 0 0 1 21.16 0"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12" y2="20"></line></svg>
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><rect x="1" y="6" width="18" height="12" rx="3" ry="3"></rect><line x1="23" y1="12" x2="23" y2="12"></line></svg>
            </div>
        </div>
        <div class="screen-content">
            <div class="header-logos">
                <img src="../image/OIP.webp" alt="Royal University of Bhutan Logo" class="left-logo">
                <img src="../image/cropped-New-JNEC-Logo-Transparent-SVG-1.png" alt="Jigme Namgyel Engineering College Logo" class="right-logo">
            </div>
            
            <h1 class="welcome-text">Welcome</h1>
            
            <div class="main-content">
                <div class="circle-container">
                    <img src="../image/WhatsApp Image 2025-09-15 at 22.32.34_f154cbae.jpg" alt="Cleaner Character" class="main-image rotating-center-logo">
                </div>
            </div>
            
            <button class="get-started-button" id="getStartedBtn">GET STARTED </button>
            
        </div>
    </div>
   <script src="../javascript/login.js"></script>

    
</body>
</html>
